packages:
  - packages/**
  - docs
  - e2e
  - i18n
  - server
  - plugins
  - web
  - .github
  - packages/*
allowBuilds:
  "@nestjs/core": false
  "@parcel/watcher": false
  "@scarf/scarf": false
  "@swc/core": false
  bcrypt: true
  canvas: false
  core-js: false
  cpu-features: false
  es5-ext: false
  esbuild: false
  msgpackr-extract: false
  protobufjs: false
  sharp: true
  ssh2: false
  utimes: false
  "@tailwindcss/oxide": true
  core-js-pure: false
  postman-code-generators: false
overrides:
  brace-expansion@>=2.0.0 <2.1.2: ^2.1.2
  brace-expansion@>=3.0.0 <5.0.7: ^5.0.7
  canvas: 3.2.3
  cookie@<0.7.0: ^0.7.2
  esbuild@<=0.24.2: ^0.25.0
  fast-uri@<3.1.3: ^3.1.3
  immutable@>=5.0.0-beta.1 <5.1.8: ^5.1.8
  sharp: ^0.35.3
  tar@<=7.5.18: ^7.5.19
  undici@<6.27.0: ^6.27.0
  ws@>=8.0.0 <8.21.0: ^8.21.0
packageExtensions:
  nestjs-kysely:
    dependencies:
      tslib: "*"
  nestjs-otel:
    dependencies:
      tslib: "*"
  "@photo-sphere-viewer/equirectangular-video-adapter":
    dependencies:
      three: "*"
  "@photo-sphere-viewer/video-plugin":
    dependencies:
      three: "*"
  sharp:
    dependencies:
      node-addon-api: "*"
      node-gyp: "*"
  "@immich/ui":
    dependencies:
      tailwindcss: ">=4.1"
  tailwind-variants:
    dependencies:
      tailwindcss: ">=4.1"
  bcrypt:
    dependencies:
      node-addon-api: "*"
      node-gyp: "*"
  "@nestjs/swagger":
    peerDependencies:
      typescript: "*"
dedupePeerDependents: false
preferWorkspacePackages: true
injectWorkspacePackages: true
shamefullyHoist: false
verifyDepsBeforeRun: install
minimumReleaseAgeExclude:
  - "@immich/ui@0.81.1"
  - esbuild@0.25.0
  - cookie@0.7.2
  - undici@6.27.0
  - ws@8.21.0
  - brace-expansion@2.1.2
  - brace-expansion@5.0.7
  - tar@7.5.19
  - fast-uri@3.1.3
  - immutable@5.1.8
