services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie
    environment:
      POSTGRES_DB: cimmich_test
      POSTGRES_USER: cimmich_test
      POSTGRES_PASSWORD: synthetic-only-password
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cimmich_test -d cimmich_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
